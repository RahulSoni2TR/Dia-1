<body>

	<header class="header">

	<div class="container">
		<h1>Modify Product</h1>
		<div id="modifyChooser" class="modify-chooser">
			<button type="button" class="load-button" onclick="goToBatchUpdate()">Batch Update</button>
			<button type="button" class="submit-button" onclick="showExistingModify()">Existing Modify</button>
		</div>
		<form id="productForm" enctype="multipart/form-data"
			onsubmit="submitForm(event)" method="POST" style="display: none;">
			<label for="productId">Enter Design No. to Modify:</label> <input
				type="text" id="productId" name="productId" step="any" required>

			<button type="button" class="load-button"

			<div id="productDetails" class="product-details"

				<label for="categoryId">Category:</label> <select id="categoryId"
					name="categoryId" onchange="updateCategoryFields()">
					<option value="">Select Category</option>
					<option value="1">Diamond</option>
					<option value="2">Open Setting</option>
					<option value="3">Plain Gold</option>
					<option value="4">Vilandi</option>
					<option value="5">Jadtar</option>
				</select> <label for="subCategoryId">Sub Category:</label> <select
					id="subCategoryId" name="subCategoryId"
					onchange="updateSubCategoryFields()">

					<option value="6">Jadtar Register</option>
					<option value="7">Jadtar Halfsets</option>
					<option value="8">Jadtar Bangles / Bracelets</option>
					<option value="9">Vilandi Halfsets</option>
					<option value="10">Vilandi Bangles / Bracelets</option>
					<option value="11">Diamond Bangles / Bracelets</option>
					<option value="12">Diamond Pendants / Pendant Sets</option>
					<option value="13">Diamond Halfsets</option>
					<option value="14">OS Halfsets</option>
					<option value="15">OS Bangles / Bracelets</option>
					<option value="16">PG Bangles / Bracelets</option>
					<option value="17">Only Earrings</option>
					<option value="18">Chains</option>
					<option value="19">Diamond Earrings</option>
					<option value="20">Diamond Rings</option>
				</select> <label for="productName">Product Name:</label>
				 <input type="text"id="productName" name="productName" required> 
				 
				 				<!-- Common fields for all categories -->
				<div id="commonFields">
				<label for="karat">Karat:</label> 
				<input type="text" id="karat" name="karat" step="any"> 
				
				<label for="productImageUrl">Image URL:</label> <input type="text"
					id="productImageUrl" name="productImageUrl"
					onchange="updateImagePreview()" readonly>
				<button type="button" id="uploadImageButton"
					onclick="document.getElementById('imageFileInput').click()">Select
					Image</button>
				<input type="file" id="imageFileInput" name="image"
					style="display: none;" accept="image/*" onchange="uploadImage()">
				<img id="imagePreview" src="" alt="Image Preview" />
				
				
								 <label>Existing
					Register Id:</label> <input type="text" id="oldOrderId" name="oldOrderId"
					step="any" disabled> <label>Set New Register Id:</label>

				<div style="display: flex; gap: 1rem; align-items: center;">
					<label> <input type="radio" name="orderIdOption"
						value="existing" checked onchange="toggleOrderIdInput()">
						Select Existing
					</label> <label> <input type="radio" name="orderIdOption"
						value="new" onchange="toggleOrderIdInput()"> Enter New
					</label>
				</div>

				<!-- Dropdown for selecting existing order ID -->
				<select id="existingOrderIds" style="margin-top: 8px; width: 200px;"></select>

				<!-- Textbox for new order ID -->
				<input type="text" id="newOrderId" placeholder="Enter New Order ID"
					style="display: none; margin-top: 8px;" /> <input type="hidden"

				<label for="designNo">Design No:</label>
				 <input type="text" id="designNo" name="designNo" step="any">
						
						<label for="gross">Gross:</label>

					<label for="productNet">Net:</label>
					 <input type="text" id="productNet" name="productNet" step="any">
					
				</div>

				<!-- Category-specific fields -->
				<div id="categoryFields" style="display: none;">
					<div id="diamondRingsFields" class="category-specific"
						style="display: none;">

						<label for="pcs">Pieces:</label> <input type="number" id="pcs"
							name="pcs" step="any">
						<div class="inline-fields">
							<label for="diaWeight">Diamonds (ct):</label> 
							<input type="text" id="diaWeight" name="diaWeight"> 
							<label for="diaRate">Diamond Rate:</label> 
							<input type="text" id="diaRate" name="diaRate">
						</div>

						<div class="inline-fields">
							<label for="diaOs">Other Stones:</label>

								<label for="diaOsRate">Other Stones Rate:</label>

						</div>
						
						<div class="inline-fields">

							<label for="diamondsCtRate">Diamond Rate:</label> <input
								type="text" id="diamondsCtRate" name="diamondsCtRate" step="any">
						</div>
						<div class="inline-fields">
							<label for="beadsCt">Beads(Ct.):</label> <input type="number"
								id="beadsCt" name="beadsCt" step="any"> <label
								for="beadsRate">Beads Rate:</label> <input type="number"
								id="beadsRate" name="beadsRate" step="any">
						</div>
						<div class="inline-fields">
							<label for="pearlsGm">Pearls(gm):</label> <input type="text"

						</div>
						<div class="inline-fields">
							<label for="ssosPearllbl">SS Pearls(Ct.):</label> <input
								type="number" id="ssosPearllbl" name="ssosPearllbl" step="any">
							<label for="ssosPearlCt">SS Pearls Rate:</label> <input
								type="number" id="ssosPearlCt" name="ssosPearlCt" step="any">
						</div>

						</div>
					</div>

					<div id="chainsFields" class="category-specific"
						style="display: none;"></div>

					<!--   <div id="diamondEarringsFields" class="category-specific" style="display: none;">
                        <label for="designNoEarrings">Design No:</label>
                        <input type="text" id="designNoEarrings" name="designNoEarrings" step="any">
                        <label for="pcsEarrings">Pieces:</label>
                        <input type="number" id="pcsEarrings" name="pcsEarrings" step="any">
                        <label for="diamondsCtEarrings">Diamonds(Ct.):</label>
                        <input type="number" id="diamondsCtEarrings" name="diamondsCtEarrings" step="any">
                        <label for="diamondsCtEarringsRate">Diamonds Rate:</label>
                        <input type="number" id="diamondsCtEarringsRate" name="diamondsCtEarringsRate" step="any">
                        <label for="diaEOs">Other Stones:</label>
                        <input type="text" id="diaEOs" name="diaEOs" step="any">
                        <label for="diaOsRate">Other Stones Rate:</label>
                        <input type="text" id="diaEOsRate" name="diaEOsRate" step="any">
                    </div>
 -->
					<div id="vilandiFields" class="category-specific"
						style="display: none;">
						<!--                         <label for="netVilandi">Net:</label>
                        <input type="number" id="netVilandi" name="netVilandi" step="any"> -->
						<div class="inline-fields">
							<label for="vilandi">Vilandi:</label> <input type="number"
								id="vilandi" name="vilandi" step="any"> <label
								for="vRate">Vilandi Rate:</label> <input type="number"
								id="vRate" name="vRate" step="any">
						</div>
						<div class="inline-fields">
							<label for="stones">Stones:</label> <input type="number"
								id="stones" name="stones" step="any"> <label
								for="vsRate">Stones Rate:</label> <input type="number"
								id="vsRate" name="vsRate" step="any">
						</div>
						<div class="inline-fields">
							<label for="beadsCtVilandi">Beads(Ct.):</label> <input
								type="number" id="beadsCtVilandi" name="beadsCtVilandi"
								step="any"> <label for="vbRate">Beads Rate:</label> <input
								type="number" id="vbRate" name="vbRate" step="any">
						</div>
						<div class="inline-fields">
							<label for="pearlsGmVilandi">Pearls(gm):</label> <input
								type="number" id="pearlsGmVilandi" name="pearlsGmVilandi"
								step="any"> <label for="vpRate">Pearls Rate:</label> <input
								type="number" id="vpRate" name="vpRate" step="any">
						</div>
						<div class="inline-fields">
							<label for="ssPearlCt">SS Pearls(Ct.):</label> <input
								type="number" id="ssPearlCt" name="ssPearlCt" step="any">
							<label for="vssRate">SS Pearls Rate:</label> <input type="number"
								id="vssRate" name="vssRate" step="any">
						</div>
						<div class="inline-fields">
							<label for="vrealStone">Real Stone:</label> <input type="number"
								id="vrealStone" name="vrealStone" step="any"> <label
								for="vfitting">Fitting:</label> <input type="number"
								id="vfitting" name="vfitting" step="any">
						</div>
						<div class="inline-fields">
							<label for="vmoz">Mozonite:</label> <input type="number"
								id="vmoz" name="vmoz" step="any"> <label for="vmRate">Mozonite
								Rate:</label> <input type="number" id="vmRate" name="vmRate" step="any">
						</div>
					</div>

					<div id="jadtarFields" class="category-specific"
						style="display: none;">
						<!--      <label for="netJadtar">Net:</label>
                        <input type="number" id="netJadtar" name="netJadtar" step="any"> -->
						<div class="inline-fields">
							<label for="stonesJadtar">Stones:</label> <input type="number"
								id="stonesJadtar" name="stonesJadtar" step="any"> <label
								for="jsRate">Stones Rate:</label> <input type="number"
								id="jsRate" name="jsRate" step="any">
						</div>
						<div class="inline-fields">
							<label for="beadsCtJadtar">Beads(Ct.):</label> <input
								type="number" id="beadsCtJadtar" name="beadsCtJadtar" step="any">
							<label for="jbRate">Beads Rate:</label> <input type="number"
								id="jbRate" name="jbRate" step="any">
						</div>
						<div class="inline-fields">
							<label for="pearlsGmJadtar">Pearls(gm):</label> <input
								type="number" id="pearlsGmJadtar" name="pearlsGmJadtar"
								step="any"> <label for="jpRate">Pearls Rate:</label> <input
								type="number" id="jpRate" name="jpRate" step="any">
						</div>
						<div class="inline-fields">
							<label for="ssPearlCtJadtar">SS Pearl(Ct.):</label> <input
								type="number" id="ssPearlCtJadtar" name="ssPearlCtJadtar"
								step="any"> <label for="jssRate">SS Pearls Rate:</label>
							<input type="number" id="jssRate" name="jssRate" step="any">
						</div>
						<div class="inline-fields">
							<label for="realStoneJadtar">Real Stone:</label> <input
								type="number" id="realStoneJadtar" name="realStoneJadtar"
								step="any"> <label for="jfitting">Fitting:</label> <input
								type="number" id="jfitting" name="jfitting" step="any">
						</div>
						<div class="inline-fields">
							<label for="jadvilandi">Vilandi:</label> <input type="number"
								id="jadvilandi" name="jadvilandi" step="any"> <label
								for="jadvilandiRate">Vilandi Rate:</label> <input type="number"
								id="jadvilandiRate" name="jadvilandiRate" step="any">
						</div>
						<div class="inline-fields">
							<label for="jmoz">Mozonite:</label> <input type="number"
								id="jmoz" name="jmoz" step="any"> <label for="jmRate">Mozonite
								Rate:</label> <input type="number" id="jmRate" name="jmRate" step="any">
						</div>
					</div>
				</div>
					<div class="labour-three-inline" style="margin-top: 15px;">	
						<label for="labour">Labour/Gm:</label> <input type="text"
							id="labour" name="labour" step="any"> <label
							for="labourAll">Labour Amount:</label> <input type="text"
							id="labourAll" name="labourAll" step="any">
							<label
							for="labourPer">Labour %:</label> <input type="text"
							id="labourPer" name="labourPer" step="any">
					</div>
				<div id="extraFieldsContainer" style="margin-top: 15px;">
					<label>Additional Fields:</label>
					<div id="extraFieldsList"></div>
					<button type="button" id="addExtraFieldBtn">Add More
						Fields</button>
				</div>
					<label for="productRemarks">Remarks:</label>
				<textarea id="productRemarks" name="productRemarks"></textarea>

				
			</div>

			<button type="submit" class="submit-button">Modify Product</button>
		</form>
		<a href="/home" class="back-button">Back to Home</a>
	</div>

	<div id="notificationModal" class="modal">
		<div id="modalContent" class="modal-content">
			<h2 id="modalTitle"></h2>
			<p id="modalMessage"></p>
			<button class="close-btn">OK</button>
		</div>
	</div>
	<script>
	function showExistingModify() {
		document.getElementById('modifyChooser').style.display = 'none';
		document.getElementById('productForm').style.display = 'block';
	}

	function goToBatchUpdate() {
		window.location.href = '/batch-update';
	}

    function loadProductDetails() {
    	let productId;

    	if (sessionStorage.getItem("returnToViewPage") === "true") {
    	    console.log('session here');
    	    productId = sessionStorage.getItem("modifyDesignNo");
    	} else {
    		console.log('here');
    	    productId = document.getElementById('productId').value;
    	}

    	
    	
        fetch(`/loadProduct/${productId}`)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Product not found');
                }
                return response.json();
            })
            .then(product => {
                document.getElementById('productName').value = product.item;
                document.getElementById('oldOrderId').value = product.orders ? product.orders.orderId || '' : '';
             //   document.getElementById('productPrice').value = product.price?.toFixed(2) || '';
                document.getElementById('productRemarks').value = product.remarks;
                document.getElementById('productNet').value = product.net;
                document.getElementById('labour').value = product.labour;
                document.getElementById('labourAll').value = product.labourAll;
                document.getElementById('labourPer').value = product.labourP;
                document.getElementById('karat').value = product.karat;
                document.getElementById('productImageUrl').value = product.imageUrl;
                updateImagePreview();

                const categoryId = product.categoryId;
                const subCategoryId = product.subCategoryId;
                document.getElementById('categoryId').value = categoryId;
                updateSubCategories();

                document.getElementById('subCategoryId').value = subCategoryId;
                updateCategoryFields();
                document.getElementById('subCategoryId').value = subCategoryId;
                loadAvailableOrderIds(categoryId, subCategoryId);
                document.getElementById('designNo').value = product.designNo; 
                document.getElementById('gross').value = product.gross;

                // Populate category-specific fields based on category
                if (categoryId === 1) { // Diamond Rings    
                    document.getElementById('pcs').value = product.pcs;
                    document.getElementById('diaWeight').value = product.diamondsCt;
                    document.getElementById('diaRate').value = product.diaRt;
                    document.getElementById('diaOs').value = product.otherStonesCt;
                    document.getElementById('diaOsRate').value = product.otherStonesRt;
                } else if (categoryId === 2) { // Open Setting
                    document.getElementById('vilandiCt').value = product.vilandiCt;
                    document.getElementById('vilandiRate').value = product.vRate;
                    document.getElementById('diamondsCt').value = product.diamondsCt;
                    document.getElementById('diamondsCtRate').value = product.diaRt;
                    document.getElementById('beadsCt').value = product.beadsCt;
                    document.getElementById('beadsRate').value = product.bdRate;
                    document.getElementById('pearlsGm').value = product.pearlsGm;
                    document.getElementById('ssosPearllbl').value = product.ssPearlCt;
                    document.getElementById('ssosPearlCt').value = product.ssRate;
                    document.getElementById('openPearlsRate').value = product.prlRate;
                    document.getElementById('otherStonesCt').value = product.otherStonesCt;
                    document.getElementById('otherOsRate').value = product.otherStonesRt;
                 //   document.getElementById('others').value = product.others;
                } else if (categoryId === 3) { // Chains

                } /* else if (categoryId === 4) { // Diamond Earrings
                	console.log(product);
                     document.getElementById('designNoEarrings').value = product.designNo; 
                    document.getElementById('pcsEarrings').value = product.pcs;
                    document.getElementById('diamondsCtEarrings').value = product.diamondsCt;
                    document.getElementById('diamondsCtEarringsRate').value = product.diaRt;
                    document.getElementById('diaEOs').value = product.otherStonesCt;
                    document.getElementById('diaEOsRate').value = product.otherStonesRt;               
                } */ else if (categoryId === 4) { // Vilandi
                    document.getElementById('vilandi').value = product.vilandiCt;
                    document.getElementById('vRate').value = product.vRate;
                    document.getElementById('stones').value = product.stones;
                    document.getElementById('vsRate').value = product.stRate;
                    document.getElementById('beadsCtVilandi').value = product.beadsCt;
                    document.getElementById('vbRate').value = product.bdRate;
                    document.getElementById('pearlsGmVilandi').value = product.pearlsGm;
                    document.getElementById('vpRate').value = product.prlRate;
                    document.getElementById('ssPearlCt').value = product.ssPearlCt;
                    document.getElementById('vssRate').value = product.ssRate;
                    document.getElementById('vrealStone').value = product.realStone;
                    document.getElementById('vfitting').value = product.fitting;
                    document.getElementById('vmoz').value = product.mozonite;
                    document.getElementById('vmRate').value = product.mRate;
                } else if (categoryId === 5) { // Jadtar Register
                    document.getElementById('stonesJadtar').value = product.stones;
                    document.getElementById('beadsCtJadtar').value = product.beadsCt;
                    document.getElementById('pearlsGmJadtar').value = product.pearlsGm;
                    document.getElementById('ssPearlCtJadtar').value = product.ssPearlCt;
                    document.getElementById('realStoneJadtar').value = product.realStone;
                    document.getElementById('jsRate').value = product.stRate;
                    document.getElementById('jbRate').value = product.bdRate;
                    document.getElementById('jpRate').value = product.prlRate;
                    document.getElementById('jssRate').value = product.ssRate;
                    document.getElementById('jfitting').value = product.fitting;
                    document.getElementById('jmoz').value = product.mozonite;
                    document.getElementById('jmRate').value = product.mRate;
                }
                $('#extraFieldsList').empty();

                if (product.customFields) {
                	  try {
                	    const extras = JSON.parse(product.customFields);
                	    $('#extraFieldsList').empty();
                	    for (const [fieldName, obj] of Object.entries(extras)) {
                	      const $div = $(`
                	        <div class="extraFieldPair">
                	    		  <label for="karat">Name:</label>
                	          <input type="text" class="extraFieldName" placeholder="Name" required />
                	          <label for="karat">Qty:</label>
                	          <input type="number" class="extraFieldQty" placeholder="Qty (Ct./ etc)"  step="any" required />
                	          <label for="karat">Price:</label>
                	          <input type="number" class="extraFieldRate" placeholder="Rate" step="any" required style="width:100px;" />
                	          <button type="button" class="removeBtn">Remove</button>
                	        </div>`);
                	      $div.find('.extraFieldName').val(fieldName);
                	      $div.find('.extraFieldQty').val(obj.qty || '');
                	      $div.find('.extraFieldRate').val(obj.rate || '');
                	      $('#extraFieldsList').append($div);
                	    }
                	  } catch (e) {
                	    console.error('Error parsing customFields', e);
                	  }
                	}
                
             // Add new fields
                $('#extraFieldsList').on('click', '.removeBtn', function() {
                  $(this).closest('.extraFieldPair').remove();
                });
                
                $('#extraFieldsList').on('click', '.removeExtraFieldBtn', function() {
                    $(this).closest('.extraFieldPair').remove();
                  });
                  
             
                $('#extraFieldsContainer').on('click', '#addExtraFieldBtn', function () {
                	  const fieldHtml = `
                	    <div class="extraFieldPair">
                	      <input type="text" class="extraFieldName" placeholder="Field name" required />
                	      <input type="number" class="extraFieldQty" placeholder="Qty (Ct./Gm/ etc)"  step="any" required />
                	      <input type="number" class="extraFieldRate" placeholder="Rate" step="any" required style="width:100px;" />
                	      <button type="button" class="removeExtraFieldBtn">Remove</button>
                	    </div>`;
                	  $('#extraFieldsList').append(fieldHtml);
                	});


                document.getElementById('productDetails').style.display = 'block'; // Show details
            })
            .catch(error => {
                showModal("Error", error.message, false);
                document.getElementById('productDetails').style.display = 'none';

                // Close modal without redirect
                $(".close-btn").off("click").on("click", function () {
                    $("#notificationModal").fadeOut();
                });
            });

    }
    
    const subCategories = {
    	    "Jadtar": [
    	        {id: 6, name: "Jadtar Register"},
    	        {id: 7, name: "Jadtar Halfsets"},
    	        {id: 8, name: "Jadtar Bangles / Bracelets"},
    	        {id: 5, name: "Only Earrings"}
    	    ],
    	    "Vilandi": [
    	        {id: 9, name: "Vilandi Halfsets"},
    	        {id: 10, name: "Vilandi Bangles / Bracelets"},
    	    ],
    	    "Diamond": [
    	        {id: 20, name: "Diamond Rings"},
    	        {id: 19, name: "Diamond Earrings"},
    	        {id: 11, name: "Diamond Bangles / Bracelets"},
    	        {id: 12, name: "Diamond Pendants / Pendant Sets"},
    	        {id: 13, name: "Diamond Halfsets"},
    	    ],
    	    "Open Setting": [
    	        {id: 14, name: "OS Halfsets"},
    	        {id: 15, name: "OS Bangles / Bracelets"},
    	    ],
    	    "Plain Gold": [
    	        {id: 18, name: "Chains"},
    	        {id: 16, name: "PG Bangles / Bracelets"},
    	    ],
    	};

    const categoryMap = {
    	    1: "Diamond",
    	    2: "Open Setting",

        function updateImagePreview() {
            const imageUrl = document.getElementById('productImageUrl').value;
            const imagePreview = document.getElementById('imagePreview');

            if (imageUrl) {
                imagePreview.src = imageUrl;
                imagePreview.style.display = 'block'; // Show the image
            } else {
                imagePreview.style.display = 'none'; // Hide the image if URL is empty
            }
        }

        function uploadImage() {
            const fileInput = document.getElementById('imageFileInput');
            const file = fileInput.files[0];

            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('productImageUrl').value = event.target.result; // Set the image URL to the base64 data
                    updateImagePreview(); // Update the preview
                };
                reader.readAsDataURL(file); // Convert the file to base64
            }
        }

        function showModal(title, message, isSuccess) {
            const modal = $("#notificationModal");
            const modalContent = $("#modalContent");

            // Update modal content and styling
            if (title && message) { // Ensure title and message are not empty
                $("#modalTitle").text(title);
                $("#modalMessage").text(message);
                modalContent.removeClass("modal-success modal-error");
                modalContent.addClass(isSuccess ? "modal-success" : "modal-error");

                // Show the modal
                modal.fadeIn(); // Show the modal with fadeIn

                // Bind the close button click event here
                $(".close-btn").off("click").on("click", function () {
                    modal.fadeOut(); // Hide the modal when clicking the "OK" button
                    $("#modalTitle").text(""); // Clear the title
                    $("#modalMessage").text(""); // Clear the message
                });
            } else {
                console.warn("Modal content is missing. Title or message is empty.");
            }
        }

        $(".close-btn").on("click", function () {
            $("#notificationModal").fadeOut(); // Hide the modal when clicking the "OK" button
            $("#modalTitle").text(""); // Clear the title
            $("#modalMessage").text(""); // Clear the message
        });
        
      


        
        function submitForm(event) {
            event.preventDefault(); // Prevent default form submission
 
                const selectedOption = document.querySelector('input[name="orderIdOption"]:checked').value;
                const finalOrderInput = document.getElementById("finalOrderId");

                if (selectedOption === 'existing') {
                	 var val = document.getElementById("existingOrderIds").value;
                     if (!val) {
                         val = document.getElementById("oldOrderId").value;
                     }
                     finalOrderInput.value = val;
                    
                } else {
                    finalOrderInput.value = document.getElementById("newOrderId").value;
                }

                const extras = {};
                let valid = true;
                
                $('#extraFieldsList .extraFieldPair').each(function () {
                  const key = $(this).find('.extraFieldName').val().trim();
                  const qty = $(this).find('.extraFieldQty').val().trim();
                  const rate = $(this).find('.extraFieldRate').val().trim();

                  if (!key) {
                    alert("Enter a field name for all additional fields.");
                    valid = false;
                    return false; // break loop
                  }
                  if (!qty) {
                    alert("Enter quantity for all additional fields.");
                    valid = false;
                    return false;
                  }
                  if (!rate) {
                    alert("Enter rate for all additional fields.");
                    valid = false;
                    return false;
                  }

                  extras[key] = { qty: qty, rate: rate };
                });

                if (!valid) return;
                
            const form = document.getElementById('productForm');
            const formData = new FormData(form);
            formData.append('customFields', JSON.stringify(extras));
            const Id = encodeURIComponent(formData.get('productId'));
			/* console.log(formData.get('designNo'));
			console.log(formData.get('designNoVilandi'));	 */		
            $.ajax({
                url: `/updateProduct/${Id}`,
                type: 'PUT',
                data: formData,
                contentType: false, // Set to false to tell jQuery not to set the Content-Type header
                processData: false, // Prevent jQuery from automatically transforming the data into a query string
                success: function (data) {
                    showModal("Success", "Product updated successfully!", true);

                    // Clear form after success
                    $("#productForm")[0].reset();
                    $("#dynamicFields").empty();
                    $('#extraFieldsList').empty();

                 // Inside $.ajax success: after showModal("Success", ...)

                    $(".close-btn").off("click").on("click", function () {
                      $("#notificationModal").fadeOut(() => {
                        // Read handoff (sessionStorage preferred)
                        const ssReturnUrl = sessionStorage.getItem("returnUrl");
                        const ssReturnDesignNo = sessionStorage.getItem("returnDesignNo");
                        const ssReturnContext = sessionStorage.getItem("returnContext");

                        // Fallback to query params
                        const sp = new URLSearchParams(location.search);
                        const qpReturnUrl = sp.get('returnUrl');
                        const qpReturnDesignNo = sp.get('returnDesignNo');
                        const qpReturnContext = sp.get('returnContext');

                        // Final targets with safe default: stay on Modify if none provided
                        const baseUrl = ssReturnUrl || qpReturnUrl || location.href;   // default = this page
                        const returnDesignNo = ssReturnDesignNo || qpReturnDesignNo || "";
                        const returnContext = ssReturnContext || qpReturnContext || "";

                        // Clear handoff keys to avoid stale redirects
                        ["returnUrl","returnDesignNo","returnContext","returnToViewPage","modifyDesignNo"].forEach(k => sessionStorage.removeItem(k));

                        // If returning to the same page (direct use), just reload to clear the form and stay put
                        const target = new URL(baseUrl, location.origin);
                        if (baseUrl === location.href) {
                          // Optional: soft reload to reset UI without navigation history
                          location.replace(target.toString());
                          return;
                        }

                        // Otherwise, append hints so caller can restore context/open item
                        if (returnDesignNo) target.searchParams.set("openDesignNo", String(returnDesignNo));
                        if (returnContext) target.searchParams.set("returnContext", String(returnContext));
                        target.searchParams.set("updated", "1");

                        location.href = target.toString();
                      });
                    });


                },
                error: function (jqXHR, textStatus, errorThrown) {
                	console.error("AJAX Error: ", textStatus, errorThrown);
                    console.error("Response: ", jqXHR.responseText);
                    showModal("Error", "Failed to update product: " + jqXHR.responseText, false);

                    // Close modal without redirecting in error case
                    $(".close-btn").off("click").on("click", function () {
                        $("#notificationModal").fadeOut();
                    });
                }
            });
        }

        
        function toggleOrderIdInput() {
            const selectedOption = document.querySelector('input[name="orderIdOption"]:checked').value;
            const newOrderInput = document.getElementById('newOrderId');
            const existingDropdown = document.getElementById('existingOrderIds');

            if (selectedOption === 'existing') {
                newOrderInput.style.display = 'none';
                existingDropdown.style.display = 'inline-block';
            } else {
                newOrderInput.style.display = 'inline-block';
                existingDropdown.style.display = 'none';
            }
        }

function loadAvailableOrderIds(categoryId, subCategoryId) {
    if (!categoryId || !subCategoryId) {
        console.warn('Category or SubCategory missing for loadAvailableOrderIds');
        return;
    }

    // Send as list: ?categoryId=5&categoryId=7
   const params = 
    'categoryId=' + categoryId + 
    '&categoryId=' + subCategoryId;


    $.ajax({
        url: '/available-order-ids?' + params,
        method: 'GET',
        success: function (orderIds) {
            const $select = $('#existingOrderIds');
            $select.empty().append('<option value="">Select from available</option>');
            orderIds.forEach(function (id) {
                $select.append(`<option value="${id}">${id}</option>`);
            });
        },
        error: function () {
            alert("Failed to load available order IDs.");
        }
    });
}
