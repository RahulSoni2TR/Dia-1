<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gold Rates</title>

  <link rel="stylesheet" href="/public_rates_style.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Gold Rates">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="/manifest.json">
</head>

<body>

<main class="container">
  <section class="card">

    <!-- HEADER -->
    <div class="card-header">
      <h1>Gold Rates</h1>
      <p class="subtitle" id="ratesDate">--</p>
    </div>

    <!-- ================= GOLD TABLE ================= -->
     <div class="gold-section">
    <div class="table-wrap">
      <table class="rates-table">
        <thead>
          <tr>
          </tr>
        </thead>

        <tbody id="goldBody">
          <tr>
            <td colspan="3" class="loading">Loading rates...</td>
          </tr>
        </tbody>
      </table>
    </div>
    </div>

    <!-- ================= SILVER SECTION ================= -->
    <div class="silver-section">
      <h2>Silver</h2>

<div class="silver-box">
  <div>Silver</div>
  <div></div> <!-- empty center (like purity column) -->
  <div id="silverPrice">₹ --</div>
</div>
    </div>

    <p class="note">Rates are excluding GST.</p>

  </section>
</main>

<script>

/* ================= GOLD CONFIG ================= */

const commodityRows = [
  { label: '24KT', key: '24.00', purity: '' },
  { label: '22KT', key: '22.00', purity: '' },
  { label: '18KT', key: '18.00', purity: '' },
  { label: '14KT', key: '14.00', purity: '' },
  { label: '9KT',  key: '10.00',  purity: '' }
];

/* ================= HELPERS ================= */

function formatPrice(value) {
  if (value === null || value === undefined || Number.isNaN(value)) {
    return '-';
  }

  return `₹${Number(value).toLocaleString('en-IN')}`;
}

function setDate() {
  const now = new Date();
  const dd = String(now.getDate()).padStart(2, '0');
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const yyyy = now.getFullYear();

  document.getElementById('ratesDate').textContent =
    `${dd}/${mm}/${yyyy}`;
}

/* ================= LOAD DATA ================= */

async function loadRates() {
  const tbody = document.getElementById('goldBody');

  try {
    const res = await fetch('/rates');
    if (!res.ok) throw new Error('Failed to fetch rates');

    const data = await res.json();
    const ratesMap = new Map(
      data.map(item => [item.commodity, Number(item.price)])
    );

    tbody.innerHTML = '';

    /* ===== GOLD TABLE ===== */
    commodityRows.forEach(row => {
      const tr = document.createElement('tr');

      const name = document.createElement('td');
      const purity = document.createElement('td');
      const price = document.createElement('td');

      name.textContent = row.label;
      purity.textContent = row.purity;
      price.textContent = formatPrice(ratesMap.get(row.key));

      price.classList.add('price');

      tr.appendChild(name);
      tr.appendChild(purity);
      tr.appendChild(price);

      tbody.appendChild(tr);
    });

    /* ===== SILVER ===== */
    document.getElementById('silverPrice').textContent =
      formatPrice(ratesMap.get('silver'));

  } catch (error) {
    console.error(error);

    tbody.innerHTML = `
      <tr>
        <td colspan="3" class="loading">Unable to load rates.</td>
      </tr>
    `;
  }
}

/* ================= INIT ================= */

setDate();
loadRates();

</script>

</body>
</html>
