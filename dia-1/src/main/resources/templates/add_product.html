				<option value="2">Open Setting</option>

				<option value="5">Vilandi</option>
				<option value="6">Jadtar Register</option> -->

				name="karatId" required>
				<option value="">Select Karat</option>
				<option value="10">10K</option>
				<option value="14">14K</option>
				<option value="18">18K</option>
				<option value="22">22K</option>
				<option value="24">24K</option>

			<input type="submit" value="Add Product">

            function showModal(title, message, isSuccess) {
                const modal = $("#notificationModal");
                const modalContent = $("#modalContent");

                // Update modal content and styling
                $("#modalTitle").text(title);
                $("#modalMessage").text(message);
                modalContent.removeClass("modal-success modal-error");
                modalContent.addClass(isSuccess ? "modal-success" : "modal-error");

            }

            $('#productForm').on('submit', function(e) {
                e.preventDefault(); // Prevent default form submission

                
             // Collect extra fields values
                const extras = {};
                let validExtras = true;
                $('#extraFieldsList .extraFieldPair').each(function () {
                	const key = $(this).find('.extraFieldName').val().trim();
                	  const qtyStr = $(this).find('.extraFieldQty').val().trim();
                	  const rateStr = $(this).find('.extraFieldRate').val().trim();
                	  if (!key) {
                		    alert("Please enter a field name for all additional fields.");
                		    valid = false;
                		    return false; // break each loop
                		  }
                		  if (!qtyStr) {
                		    alert("Please enter quantity for all additional fields.");
                		    valid = false;
                		    return false;
                		  }
                		  if (!rateStr) {
                		    alert("Please enter rate for all additional fields.");
                		    valid = false;
                		    return false;
                		  }
                		  extras[key] = {
                				    qty: qtyStr,
                				    rate: rateStr
                				  };
                });
                if (!validExtras) return;

                
                // Create a FormData object to capture form data
                const formData = new FormData(this);
                
                if (!formData.get('imageUrl')) {
                    // Set a default value for the imageUrl field
                    formData.set('imageUrl', 'default'); // Replace with your default image URL
                }

                if (!formData.get('stockQuantity')) {
                    // Set a default value for the stockQuantity field
                    formData.set('stockQuantity', '0'); // Set default to 0
                }

                
             // Append extras JSON string if any
                if (Object.keys(extras).length > 0) {
                  formData.append('customFields', JSON.stringify(extras));
                }
                
                const selectedOrderId = $('#availableOrderId').val();
                const customOrderId = $('#customOrderId').val().trim();
                if (selectedOrderId) {
                    formData.append('orderId', selectedOrderId);
                } else if (customOrderId) {
                	console.log(customOrderId);
                    formData.append('orderId', customOrderId);
                } else {
                    showModal("Validation Error", "Please select or enter an Order ID.", false);
                    return;
                }
                
                // Send AJAX request
                $.ajax({
                    url: '/add', // Change this to your actual URL
                    type: 'POST',
                    data: formData,
                    contentType: false,
                    processData: false,
                    success: function(response) {
                    	showModal("Success", "Product added successfully!", true);
                        $("#productForm")[0].reset();
                        $("#dynamicFields").empty();
                        $('#extraFieldsList').empty();
                    },
                    error: function(xhr, status, error) {
                        let errorMsg = "An error occurred while adding the product.";

                        if (xhr.responseJSON && xhr.responseJSON.message) {
                            // If backend sent JSON with "message"
                            errorMsg = xhr.responseJSON.message;
                        } else if (xhr.responseText) {
                            try {
                                // Try parsing responseText as JSON
                                const parsed = JSON.parse(xhr.responseText);
                                if (parsed.message) {
                                    errorMsg = parsed.message;
                                } else {
                                    errorMsg = xhr.responseText; // fallback raw text
                                }
                            } catch (e) {
                                errorMsg = xhr.responseText; // not JSON, just use plain text
                            }
                        }

                        console.error("Backend Error:", errorMsg);
                        showModal("Error", errorMsg, false);
                    }

                });
            });

                function limitDecimals(value, maxDecimals) {
                    if (!value) return value;
                    const parts = value.split('.');
                    if (parts.length === 1) return value; // no decimals
                    return parts[0] + '.' + parts[1].substring(0, maxDecimals);
                }

                function attachDecimalLimit(fieldIds, maxDecimals) {
                    fieldIds.forEach(function(id) {
                        $(document).on('input', '#' + id, function() {
                            const val = $(this).val();
                            const limited = limitDecimals(val, maxDecimals);
                            if (val !== limited) {
                                $(this).val(limited);
                            }
                        });
                    });
                }

                attachDecimalLimit(gmFields, 3);
                attachDecimalLimit(ctFields, 2);
            });

            
            function formatDecimalFields() {
                // List of gm fields requiring 3 decimals
                const gmFields = ['gold', 'labour', 'pearls', 'gross', 'net', 'pearlsGm', 'chainLabour', 'drLabour', 'osLabour', 'vilandiLabour', 'jadtarLabour', 'diamondLabour', 'chainLabourAll', 'drLabourAll', 'osLabourAll', 'vilandiLabourAll', 'jadtarLabourAll', 'diamondLabourAll', 'jadtarPearls',
                	'diamondLabourPInput', 'osLabourP', 'chainLabourP', 'vilandiLabourP', 'jadtarLabourP'];
                // List of ct fields requiring 2 decimals
                const ctFields = ['beads', 'ssPearls', 'vilandi', 'diamonds', 'otherStonesCt', 'beadsCt', 'ssPearlCt', 'vilandiCt', 'diamondsCt', 'otherStonesCt', 'jadtarBeads', 'jadtarSSPearl', 'jadtarRealStone', 'diamondsCt', 'beadsVilandi', 'ssPearlCt', 'ssPearls', 'ssPearlCt'];

                // Helper to format number with fixed decimals and append zeros if necessary
                function formatWithZeros(value, decimals) {
                    if (value === '') return '';
                    let num = parseFloat(value);
                    if (isNaN(num)) return value; // if not a valid number, do not alter
                    return num.toFixed(decimals);
                }

                // Format gm fields to 3 decimals
                gmFields.forEach(function(fieldId) {
                    const input = document.getElementById(fieldId);
                    if (input && input.value !== '') {
                        input.value = formatWithZeros(input.value, 3);
                    }
                });

                // Format ct fields to 2 decimals
                ctFields.forEach(function(fieldId) {
                    const input = document.getElementById(fieldId);
                    if (input && input.value !== '') {
                        input.value = formatWithZeros(input.value, 2);
                    }
                });
            }

            // Run formatting before form submits
            $('#productForm').on('submit', function(e) {
                formatDecimalFields();
