<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View Products</title>
  <link rel="stylesheet" href="view_products_style.css">
</head>
<body>
  <header>
      <a href="/home" class="home-btn">Home</a>
    <h1>Explore Our Product Range</h1>
    <a href="/logout" class="logout-btn">Logout</a>
  </header>

  <section class="filters">
    <label for="searchBy">Search by:</label>
    <select id="searchBy">
      <option value="name">Search by Product Name</option>
      <option value="design">Search by Design No</option>
      <option value="order">Search by Register Id</option>
    </select>
    <input type="text" id="searchInput" placeholder="Search by Product Name">
    <select id="sortFilter">
      <option value="">-- Sort By --</option>
      <option value="nameAsc">Name: A to Z</option>
      <option value="nameDesc">Name: Z to A</option>
      <option value="priceAsc">Price: Low to High</option>
      <option value="priceDesc">Price: High to Low</option>
      <option value="recent">Most Recent</option>
      <option value="old">Old Products</option>
    </select>
    <button id="filterButton">Apply</button>
    <button id="resetFilters" class="secondary">Reset</button>
    <button onclick="window.location.href='/home'" id="backBtn" class="secondary" type="button">Back</button>
    <label style="margin-left:10px; display:inline-flex; gap:5px;">
      <input type="checkbox" id="togglePriceWithFields" checked/>
      Show prices including additional fields
    </label>
    <input type="hidden" id="categoryFilter">
  </section>

  <div class="content-wrapper">
    <aside class="sidebar">
      <h3>Categories</h3>
      <ul id="categoryList">
        <li data-category="">All</li>
        <!-- Categories + Subcategories will be injected via JS -->
      </ul>
    </aside>

    <main class="main-content">
      <div class="view-toggle">
        <button id="gridViewBtn" class="active">🔳 Grid</button>
        <button id="listViewBtn">📋 List</button>
      </div>

      <div class="product-grid" id="productGrid"></div>

      <div class="footer-buttons">
        <button class="load-more" id="loadMoreButton">Load More</button>
        <a href="/home" class="back-button">← Back to Home</a>
      </div>
    </main>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="deleteModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>Are you sure you want to delete this product?</h3>
      <div class="modal-actions">
        <button id="confirmDeleteBtn">Delete Product</button>
        <button id="cancelDeleteBtn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Success/Error Modal -->
  <div id="resultModal" class="modal" style="display:none;">
    <div class="modal-content">
      <p id="resultMessage"></p>
      <button id="closeResultBtn">Close</button>
    </div>
  </div>

  <script>
    let currentPage = 0;
    const productsPerPage = 12;
    let lastCategory = '';
    let lastSearchTerm = '';
    let lastSortBy = '';
    let lastSearchBy = 'name';
    let isListView = false;

    const subCategories = {
      "Jadtar": [
        {id: 6, name: "Jadtar Register"},
        {id: 7, name: "Jadtar Halfsets"},
        {id: 8, name: "Jadtar Bangles / Bracelets"},
        {id: 17, name: "Only Earrings"}
      ],
      "Vilandi": [
        {id: 9, name: "Vilandi Halfsets"},
        {id: 10, name: "Vilandi Bangles / Bracelets"}
      ],
      "Diamond": [
        {id: 20, name: "Diamond Rings"},
        {id: 19, name: "Diamond Earrings"},
        {id: 11, name: "Diamond Bangles / Bracelets"},
        {id: 12, name: "Diamond Pendants / Pendant Sets"},
        {id: 13, name: "Diamond Halfsets"}
      ],
      "Open Setting": [
        {id: 14, name: "OS Halfsets"},
        {id: 15, name: "OS Bangles / Bracelets"}
      ],
      "Plain Gold": [
        {id: 18, name: "Chains"},
        {id: 16, name: "PG Bangles / Bracelets"}
      ]
    };

    const categoryMap = {
      1: "Diamond",
      2: "Open Setting",
      3: "Plain Gold",
      4: "Vilandi",
      5: "Jadtar"
    };

    function renderCategories() {
      const categoryList = document.getElementById("categoryList");

      Object.entries(categoryMap).forEach(([catId, catName]) => {
        const li = document.createElement("li");
        li.classList.add("category-item");
        li.setAttribute("data-category", catId);
        li.innerHTML = `
          <span class="category-name">${catName}</span>
          <ul class="subcategory-list"></ul>
        `;

        const subList = li.querySelector(".subcategory-list");
        (subCategories[catName] || []).forEach(sub => {
          const subLi = document.createElement("li");
          subLi.classList.add("subcategory-item");
          subLi.setAttribute("data-category", sub.id);
          subLi.textContent = sub.name;
          subList.appendChild(subLi);
        });

        categoryList.appendChild(li);
      });

      // Expand/collapse
      categoryList.querySelectorAll(".category-name").forEach(cat => {
        cat.addEventListener("click", () => {
          cat.parentElement.classList.toggle("expanded");
        });
      });
    }

    // Highlight main category on click
    document.querySelectorAll('.category-item .category-name').forEach(cat => {
      cat.addEventListener('click', function () {
        document.querySelectorAll('.category-item').forEach(item => {
          item.classList.remove('active');
        });
        this.parentElement.classList.add('active');
      });
    });

    document.addEventListener("DOMContentLoaded", renderCategories);

    // Core loader: category, searchTerm, sortBy, searchBy, reset
    function loadProducts(category = '', searchTerm = '', sortBy = '', searchBy = 'name', reset = false) {
      if (reset || category !== lastCategory || searchTerm !== lastSearchTerm || sortBy !== lastSortBy || searchBy !== lastSearchBy) {
        currentPage = 0;
        document.getElementById('productGrid').innerHTML = '';
      }

      const params = new URLSearchParams({
        page: String(currentPage),
        size: String(productsPerPage),
        category,
        searchTerm,
        sortBy,
        searchBy
      });

      fetch(`/product/load?${params.toString()}`)
        .then(response => response.json())
        .then(data => {
          const productGrid = document.getElementById('productGrid');

          if (!data.products || data.products.length === 0) {
            if (currentPage === 0) {
              productGrid.innerHTML = '<p>No products found.</p>';
            }
            document.getElementById('loadMoreButton').style.display = 'none';
            // Update state so subsequent actions still carry searchBy
            lastCategory = category;
            lastSearchTerm = searchTerm;
            lastSortBy = sortBy;
            lastSearchBy = searchBy;
            sessionStorage.setItem('lastSearchBy', searchBy);
            return;
          }

          
          data.products.forEach(product => {
            const productCard = document.createElement('div');
            productCard.classList.add('product-card');
         // Mark product as verified if it's in the verified list
const isVerified = Number(product.verificationStatus) === 1;
console.log(isVerified);
            if (isVerified) {
                productCard.classList.add('verified'); // optional class for UI
            }
            const usePriceWithFieldsCheckbox = document.getElementById('togglePriceWithFields');
            const usePriceWithFields = usePriceWithFieldsCheckbox ? usePriceWithFieldsCheckbox.checked : false;

            const priceToShow = usePriceWithFields && product.priceWithFields != null
              ? (product.priceWithFields ? product.priceWithFields.toFixed(2) : '')
              : (product.price ? product.price.toFixed(2) : '');

            if (isListView) {
              productCard.innerHTML = `
                <img src="${product.imageUrl}" alt="${product.item}">
                <div class="product-details">
                  <p class="product-design-centered">Design No: ${(product.orders ? product.orders.orderId : 'N/A')}/${product.designNo}</p>
                  <p class="product-name-label">
                    <span class="label">Product Name:</span>
                    <span class="value">${product.item}</span>
                  </p>
                  <img class="qr-code" src="${product.qrCodePath}" alt="QR Code" />
                  <p class="product-price" style="text-align:center">₹${Math.round(Number(priceToShow))}</p>
                  <div class="button-container">
                    <button class="load-product" data-id="${product.productId}" title="View Product">👁️ View Product</button>
                    <button class="estimate-product" data-id="${product.productId}" title="Estimate Product">📊 Estimate</button>
                    <button class="delete-product" data-id="${product.designNo}" title="Delete Product">🗑️ Delete Product</button>
                    <button class="modify-product" data-id="${product.designNo}" title="Modify Product">📝 Modify Product</button>
                  </div>
                </div>
              `;
            } else {
              productCard.innerHTML = `
                <img src="${product.imageUrl}" alt="${product.item}">
                <p class="product-design-centered">Design No: ${(product.orders ? product.orders.orderId : 'N/A')}/${product.designNo}</p>
                <p class="product-name-label">
                  <span class="label">Product Name:</span>
                  <span class="value">${product.item}</span>
                </p>
                <div class="qr-container">
                  <img class="qr-code" src="${product.qrCodePath}" alt="QR Code" />
                </div>
                <p class="product-price" style="text-align:center">₹${Math.round(Number(priceToShow))}</p>
                <div class="button-container">
                  <button class="load-product" data-id="${product.productId}" title="View Product">👁️ View Product</button>
                  <button class="estimate-product" data-id="${product.productId}" title="Estimate Product">📊 Estimate</button>
                  <button class="delete-product" data-id="${product.designNo}" title="Delete Product">🗑️ Delete Product</button>
                  <button class="modify-product" data-id="${product.designNo}" title="Modify Product">📝 Modify Product</button>
                </div>
              `;
            }

            document.getElementById('productGrid').appendChild(productCard);
          });

          currentPage++;
          document.getElementById('loadMoreButton').style.display =
            currentPage * productsPerPage >= data.totalCount ? 'none' : 'block';

          // Persist state including searchBy
          lastCategory = category;
          lastSearchTerm = searchTerm;
          lastSortBy = sortBy;
          lastSearchBy = searchBy;
          sessionStorage.setItem('lastSearchBy', searchBy);
        })
        .catch(err => console.error("Error loading products:", err));
    }

    // Load More (must carry searchBy)
    document.getElementById('loadMoreButton').addEventListener('click', () => {
      loadProducts(lastCategory, lastSearchTerm, lastSortBy, lastSearchBy);
    });

    // Category & subcategory clicks (compute combined ids)
    document.addEventListener('click', function (e) {
      const item = e.target.closest('#categoryList li');
      if (!item) return;

      let selectedCategory = item.getAttribute('data-category');

      if (item.classList.contains('category-item')) {
        const subIds = [...item.querySelectorAll('.subcategory-item')].map(sub => sub.getAttribute('data-category'));
        if (subIds.length > 0) {
          selectedCategory = [selectedCategory, ...subIds].join(",");
        }
      }

      document.querySelectorAll('#categoryList li').forEach(li => li.classList.remove('active'));
      item.classList.add('active');

      document.getElementById('categoryFilter').value = selectedCategory;
      const searchBy = document.getElementById('searchBy').value;
      loadProducts(
        selectedCategory,
        document.getElementById('searchInput').value.trim(),
        document.getElementById('sortFilter').value,
        searchBy,
        true
      );
    });

    // Apply Filters
    document.getElementById('filterButton').addEventListener('click', () => {
      const searchBy = document.getElementById('searchBy').value;
      loadProducts(
        document.getElementById('categoryFilter').value,
        document.getElementById('searchInput').value.trim(),
        document.getElementById('sortFilter').value,
        searchBy,
        true
      );
    });

    // Sort change
    document.getElementById('sortFilter').addEventListener('change', function () {
      loadProducts(lastCategory, lastSearchTerm, this.value, lastSearchBy, true);
    });

    // Reset filters (also reset searchBy/UI)
    document.getElementById('resetFilters').addEventListener('click', () => {
      sessionStorage.removeItem('lastCategory');
      sessionStorage.removeItem('lastSearchTerm');
      sessionStorage.removeItem('lastSortBy');
      sessionStorage.removeItem('lastView');
      sessionStorage.removeItem('lastSearchBy');

      document.getElementById('categoryFilter').value = '';
      document.getElementById('searchInput').value = '';
      document.getElementById('sortFilter').value = '';
      const searchByEl = document.getElementById('searchBy');
      searchByEl.value = 'name';
      document.getElementById('searchInput').placeholder = 'Search by Product Name';

      document.querySelectorAll('#categoryList li').forEach(li => li.classList.remove('active'));
      const allOption = document.querySelector('#categoryList li[data-category=""]');
      if (allOption) allOption.classList.add('active');

      currentPage = 0;
      loadProducts('', '', '', 'name', true);
    });

    // View Toggle
    document.getElementById('gridViewBtn').addEventListener('click', () => {
      isListView = false;
      document.getElementById('productGrid').classList.remove('list-view');
      document.getElementById('gridViewBtn').classList.add('active');
      document.getElementById('listViewBtn').classList.remove('active');
      loadProducts(lastCategory, lastSearchTerm, lastSortBy, lastSearchBy, true);
    });

    document.getElementById('listViewBtn').addEventListener('click', () => {
      isListView = true;
      document.getElementById('productGrid').classList.add('list-view');
      document.getElementById('listViewBtn').classList.add('active');
      document.getElementById('gridViewBtn').classList.remove('active');
      loadProducts(lastCategory, lastSearchTerm, lastSortBy, lastSearchBy, true);
    });

    // Product View & Estimate
    document.getElementById('productGrid').addEventListener('click', function (e) {
      const target = e.target;
      const productId = target.getAttribute('data-id');
      if (target.classList.contains('load-product')) {
        sessionStorage.setItem('productId', productId);
        sessionStorage.setItem('lastCategory', lastCategory);
        sessionStorage.setItem('lastSearchTerm', lastSearchTerm);
        sessionStorage.setItem('lastSortBy', lastSortBy);
        sessionStorage.setItem('lastView', isListView ? 'list' : 'grid');
        sessionStorage.setItem('lastSearchBy', lastSearchBy);
 //      sessionStorage.setItem('productId', designNo);
        window.location.href = '/load-product';
      } else if (target.classList.contains('estimate-product')) {
        sessionStorage.setItem('productId', productId);
        sessionStorage.setItem('lastCategory', lastCategory);
        sessionStorage.setItem('lastSearchTerm', lastSearchTerm);
        sessionStorage.setItem('lastSortBy', lastSortBy);
        sessionStorage.setItem('lastView', isListView ? 'list' : 'grid');
        sessionStorage.setItem('lastSearchBy', lastSearchBy);
        window.location.href = '/get-estimate';
      }  else if (target.classList.contains('modify-product')) {
    	  const designNo = target.getAttribute('data-id') || '';
    	  sessionStorage.setItem('returnUrl', window.location.href);
    	  sessionStorage.setItem('returnDesignNo', String(designNo));
    	  sessionStorage.setItem('returnContext', 'view');

    	  sessionStorage.setItem('returnToViewPage', 'true');
    	  sessionStorage.setItem('modifyDesignNo', designNo);

    	  const url = new URL('/modify-product', location.origin);
    	  url.searchParams.set('designNo', designNo);
    	  url.searchParams.set('returnUrl', window.location.href);
    	  url.searchParams.set('returnDesignNo', designNo);
    	  url.searchParams.set('returnContext', 'view');
    	  location.href = url.toString();
    	}
    });

    // DOM ready: restore filters and do a single initial load
    document.addEventListener('DOMContentLoaded', function () {
      const savedSearchBy = sessionStorage.getItem('lastSearchBy') || 'name';
      document.getElementById('searchBy').value = savedSearchBy;

      const savedCategory = sessionStorage.getItem('lastCategory') || '';
      const savedSearch = sessionStorage.getItem('lastSearchTerm') || '';
      const savedSort = sessionStorage.getItem('lastSortBy') || '';
      const savedView = sessionStorage.getItem('lastView');

      // Restore UI
      document.getElementById('categoryFilter').value = savedCategory;
      document.getElementById('searchInput').value = savedSearch;
      document.getElementById('sortFilter').value = savedSort;

      // Placeholder reflecting saved mode
      const si = document.getElementById('searchInput');
      si.placeholder =
        savedSearchBy === 'design' ? 'Search by Design No' :
        savedSearchBy === 'order'  ? 'Search by Register Id' :
                                     'Search by Product Name';

      // Sidebar state
      document.querySelectorAll('#categoryList li').forEach(li => li.classList.remove('active'));
      const activeLi = document.querySelector(`#categoryList li[data-category="${savedCategory}"]`);
      if (activeLi) activeLi.classList.add('active');

      // View
      if (savedView === 'list') {
        isListView = true;
        document.getElementById('productGrid').classList.add('list-view');
        document.getElementById('listViewBtn').classList.add('active');
        document.getElementById('gridViewBtn').classList.remove('active');
      } else {
        isListView = false;
        document.getElementById('productGrid').classList.remove('list-view');
        document.getElementById('gridViewBtn').classList.add('active');
        document.getElementById('listViewBtn').classList.remove('active');
      }

      // Single initial load using restored filters
      loadProducts(savedCategory, savedSearch, savedSort, savedSearchBy, true);

      // Enter to Apply
      document.getElementById('searchInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          document.getElementById('filterButton').click();
        }
      });
    });

    // Update placeholder when searchBy changes
    document.getElementById('searchBy').addEventListener('change', function () {
      const si = document.getElementById('searchInput');
      const map = {
        name: 'Search by Product Name',
        design: 'Search by Design No',
        order: 'Search by Order Id'
      };
      si.placeholder = map[this.value] || map.name;
    });

    // Toggle price display mode — keep current filters and searchBy
    document.getElementById('togglePriceWithFields').addEventListener('change', () => {
      loadProducts(
        document.getElementById('categoryFilter').value,
        document.getElementById('searchInput').value.trim(),
        document.getElementById('sortFilter').value,
        document.getElementById('searchBy').value,
        true
      );
    });

    // Delete flow
    let selectedProductIdForDelete = null;
    document.getElementById('productGrid').addEventListener('click', function (e) {
      const target = e.target;
      const productId = target.getAttribute('data-id');
      if (target.classList.contains('delete-product')) {
        selectedProductIdForDelete = productId;
        document.getElementById('deleteModal').style.display = 'flex';
      }
    });

    document.getElementById('cancelDeleteBtn').addEventListener('click', () => {
      document.getElementById('deleteModal').style.display = 'none';
      selectedProductIdForDelete = null;
    });

    document.getElementById('confirmDeleteBtn').addEventListener('click', () => {
      if (!selectedProductIdForDelete) return;

      fetch(`/remove/${selectedProductIdForDelete}`, { method: 'POST' })
        .then(response => response.json())
        .then(data => {
          document.getElementById('deleteModal').style.display = 'none';
          showResultModal(data.success, data.message);
          if (data.success) {
            loadProducts(lastCategory, lastSearchTerm, lastSortBy, lastSearchBy, true);
          }
        })
        .catch(error => {
          document.getElementById('deleteModal').style.display = 'none';
          showResultModal(false, "An error occurred while deleting the product.");
        });
    });

    function showResultModal(success, message) {
      const resultModal = document.getElementById('resultModal');
      const resultMessage = document.getElementById('resultMessage');
      resultMessage.textContent = message;
      resultMessage.style.color = success ? 'green' : 'red';
      resultModal.style.display = 'flex';
    }
    
 // Close button inside the result modal
    document.getElementById('closeResultBtn').addEventListener('click', () => {
      const resultModal = document.getElementById('resultModal');
      resultModal.style.display = 'none';
      // optional: clear message text
      // document.getElementById('resultMessage').textContent = '';
    });

    // Click on overlay (outside the dialog content)
    const resultModal = document.getElementById('resultModal');
    resultModal.addEventListener('click', (e) => {
      if (e.target === resultModal) { // only when clicking the backdrop
        resultModal.style.display = 'none';
      }
    });

    // Escape key to close
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && resultModal.style.display !== 'none') {
        resultModal.style.display = 'none';
      }
    });
    
    document.getElementById("backBtn").addEventListener("click", () => {
        // Clear all saved filters/search state
        sessionStorage.removeItem('lastCategory');
        sessionStorage.removeItem('lastSearchTerm');
        sessionStorage.removeItem('lastSortBy');
        sessionStorage.removeItem('lastView');
        sessionStorage.removeItem('lastSearchBy');
        sessionStorage.removeItem('productId');

        // Reset checkboxes/filters instantly (optional for visual consistency before redirect)
        document.getElementById('categoryFilter').value = '';
        document.getElementById('searchInput').value = '';
        document.getElementById('sortFilter').value = '';
        document.getElementById('searchBy').value = 'name';

        // Now go back to home
        window.location.href = '/home';
      });

  </script>
  <footer class="page-footer">
    <span>&copy; 2026 Jewellery Store. All rights reserved.</span>
  </footer>
</body>
</html>
