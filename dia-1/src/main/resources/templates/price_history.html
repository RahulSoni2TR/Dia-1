<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Price History</title>
  <link rel="stylesheet" href="/price_history_style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="header">Product Manager</header>
  <a href="/logout" class="logout-btn">Logout</a>

  <div class="page-wrap">
    <h1>Price History</h1>

    <div class="controls">
      <div class="control">
        <label for="commodity">Commodity</label>
        <select id="commodity">
          <option value="10.00">Gold 10K</option>
          <option value="14.00">Gold 14K</option>
          <option value="18.00">Gold 18K</option>
          <option value="22.00">Gold 22K</option>
          <option value="24.00">Gold 24K</option>
          <option value="silver">Silver</option>
          <option value="diamond">Diamond</option>
          <option value="gst">GST</option>
        </select>
      </div>

      <div class="control">
        <label for="period">Period</label>
        <select id="period">
          <option value="5d">Last 5 days</option>
          <option value="3m">Last 3 months</option>
          <option value="6m">Last 6 months</option>
          <option value="1y" selected>Last 1 year</option>
          <option value="5y">Last 5 years</option>
        </select>
      </div>

      <button class="button" id="toggleDateRange">Select Date Range</button>

      <div id="dateRangeFields" class="control" style="display:none;">
        <label for="fromDate">From</label>
        <input type="date" id="fromDate">
      </div>

      <div id="dateRangeFieldsTo" class="control" style="display:none;">
        <label for="toDate">To</label>
        <input type="date" id="toDate">
      </div>

      <button class="button" id="toggleTable">Show Stats</button>
      <button class="button back-button" id="backBtn">Back</button>
    </div>

    <div class="chart-wrap" id="chartWrap">
      <canvas id="historyChart" height="120"></canvas>
    </div>

    <div id="tableWrap" class="table-wrap" style="display:none;">
      <table class="history-table">
        <thead>
          <tr>
            <th>Date/Time</th>
            <th>Old Price</th>
            <th>New Price</th>
          </tr>
        </thead>
        <tbody id="historyTableBody"></tbody>
      </table>
    </div>

    <div id="emptyState" class="empty">No history data available.</div>
  </div>

<script>
let chartInstance = null;
let lastHistoryData = [];
let isTableVisible = false;

function buildUrl(commodity, period, fromDate, toDate) {
  const params = new URLSearchParams();
  if (fromDate) {
    params.set('from', fromDate);
    if (toDate) {
      params.set('to', toDate);
    }
  } else if (period) {
    params.set('period', period);
  }
  const query = params.toString();
  return query
    ? `/rate-history/${encodeURIComponent(commodity)}?${query}`
    : `/rate-history/${encodeURIComponent(commodity)}`;
}

function renderChart(labels, values, label, isPercent) {
  const ctx = document.getElementById('historyChart');

  if (chartInstance) {
    chartInstance.destroy();
  }

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label,
        data: values,
        borderColor: '#1e88e5',
        backgroundColor: 'rgba(30, 136, 229, 0.15)',
        tension: 0.25,
        fill: true
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: {
          ticks: {
            callback: value => isPercent ? `${value}%` : `₹${value}`
          }
        }
      },
      plugins: {
        tooltip: {
          callbacks: {
            label: context => {
              const val = context.parsed.y;
              return isPercent ? `${context.dataset.label}: ${val}%` : `${context.dataset.label}: ₹${val}`;
            }
          }
        }
      }
    }
  });
}

function renderTable(data, isPercent) {
  const tbody = document.getElementById('historyTableBody');
  tbody.innerHTML = '';

  data.forEach(item => {
    const row = document.createElement('tr');
    const oldValue = item.oldPrice === null || item.oldPrice === undefined ? '-' : Number(item.oldPrice);
    const newValue = item.newPrice === null || item.newPrice === undefined ? '-' : Number(item.newPrice);

    const dateCell = document.createElement('td');
    dateCell.textContent = formatDate(item.updatedAt);

    const oldCell = document.createElement('td');
    oldCell.textContent = oldValue === '-' ? '-' : (isPercent ? `${oldValue}%` : `₹${oldValue}`);

    const newCell = document.createElement('td');
    newCell.textContent = newValue === '-' ? '-' : (isPercent ? `${newValue}%` : `₹${newValue}`);

    row.appendChild(dateCell);
    row.appendChild(oldCell);
    row.appendChild(newCell);
    tbody.appendChild(row);
  });
}

function setViewMode(tableVisible) {
  const chartWrap = document.getElementById('chartWrap');
  const tableWrap = document.getElementById('tableWrap');
  const toggleButton = document.getElementById('toggleTable');

  isTableVisible = tableVisible;
  chartWrap.style.display = tableVisible ? 'none' : 'block';
  tableWrap.style.display = tableVisible ? 'block' : 'none';
  toggleButton.textContent = tableVisible ? 'Show Chart' : 'Show Table';
}

function formatDate(isoString) {
  const date = new Date(isoString);
  if (Number.isNaN(date.getTime())) return isoString;
  return date.toLocaleString();
}

async function loadHistory() {
  const commoditySelect = document.getElementById('commodity');
  const commodity = commoditySelect.value;
  const period = document.getElementById('period').value;
  const fromDate = document.getElementById('fromDate').value;
  const toDate = document.getElementById('toDate').value;
  const emptyState = document.getElementById('emptyState');

  emptyState.style.display = 'none';

  try {
    const res = await fetch(buildUrl(commodity, period, fromDate, toDate));
    if (!res.ok) {
      throw new Error('Failed to fetch history');
    }
    const data = await res.json();

    lastHistoryData = data || [];

    if (!data || data.length === 0) {
      emptyState.style.display = 'block';
      if (chartInstance) {
        chartInstance.destroy();
        chartInstance = null;
      }
      return;
    }

    const labels = data
      .map(item => formatDate(item.updatedAt))
      .reverse();
    const values = data
      .map(item => Number(item.newPrice))
      .reverse();

    const commodityLabel = commoditySelect.selectedOptions[0].textContent;
    const isPercent = commodity === 'gst';

    renderChart(labels, values, commodityLabel, isPercent);
    renderTable(data, isPercent);
  } catch (err) {
    console.error(err);
    emptyState.style.display = 'block';
  }
}

document.getElementById('commodity').addEventListener('change', loadHistory);
document.getElementById('period').addEventListener('change', () => {
  document.getElementById('fromDate').value = '';
  document.getElementById('toDate').value = '';
  loadHistory();
});

document.getElementById('fromDate').addEventListener('change', () => {
  loadHistory();
});

document.getElementById('toDate').addEventListener('change', () => {
  loadHistory();
});

document.getElementById('backBtn').addEventListener('click', () => {
  window.location.href = '/set-price';
});

const dateRangeButton = document.getElementById('toggleDateRange');
const dateRangeFrom = document.getElementById('dateRangeFields');
const dateRangeTo = document.getElementById('dateRangeFieldsTo');
const periodSelect = document.getElementById('period');

function setDateRangeVisible(visible) {
  dateRangeFrom.style.display = visible ? 'flex' : 'none';
  dateRangeTo.style.display = visible ? 'flex' : 'none';
  periodSelect.disabled = visible;
  if (!visible) {
    document.getElementById('fromDate').value = '';
    document.getElementById('toDate').value = '';
    loadHistory();
  }
}

dateRangeButton.addEventListener('click', () => {
  const isVisible = dateRangeFrom.style.display !== 'none';
  setDateRangeVisible(!isVisible);
});

document.getElementById('toggleTable').addEventListener('click', () => {
  setViewMode(!isTableVisible);
});

loadHistory();
</script>
</body>
</html>
