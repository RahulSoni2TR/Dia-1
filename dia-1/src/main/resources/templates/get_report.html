function convertToIST(date) {
  const istOffset = 5.5 * 60 * 60 * 1000;
  const istDate = new Date(date.getTime() + istOffset);
  return istDate.toISOString().slice(0, 19).replace('T', ' ');
}

function loadFilteredProducts(page = 0) {
  document.getElementById('messageContainer').innerHTML = "";

  const categoryId = document.getElementById('categorySelect').value;
  const subCategoryId = document.getElementById('subCategorySelect').value || "";
  const startDate = document.getElementById('startDate').value;
  const endDate = document.getElementById('endDate').value;

  fieldsCheckboxes.addEventListener('change', () => {
    if (loadedProducts.length > 0) {
      renderTableHeaders();
      renderTableRows();
    }
  });

  if (!categoryId) { alert("Please select a category."); return; }
  if (!startDate || !endDate) { alert("Please select both start and end dates."); return; }

  selectedCategory = categoryId;
  startDateStr = convertToIST(new Date(startDate));
  endDateStr = convertToIST(new Date(endDate));
  
  const url = `/getReport/${categoryId}?startDate=${startDateStr}&endDate=${endDateStr}&page=${page}&size=${productsPerPage}`
      + (subCategoryId ? `&subCategoryId=${subCategoryId}` : "");

  fetch(url)
    .then(async response => {
      if (!response.ok) {
        const errorText = await response.text();
        throw new Error("No Products found in selected Date Range" || "No products found.");
      }
      return response.json();
    })
    .then(data => {
      if (!data.content || data.content.length === 0) {
        document.getElementById('messageContainer').innerHTML = "❌ No products found.";
        document.getElementById('productTableContainer').style.display = 'none';
        return;
      }

      loadedProducts = data.content;
      totalPages = data.totalPages;
      currentPage = data.number;

      renderTableHeaders();
      renderTableRows();

      document.getElementById('productTableContainer').style.display = 'block';
      updatePaginationControls();
    })
    .catch(error => {
      document.getElementById('messageContainer').innerHTML = error.message || "An error occurred.";
      document.getElementById('productTableContainer').style.display = 'none';
    });
}

function renderTableHeaders() {
  const selectedFields = Array.from(fieldsCheckboxes.querySelectorAll('input[type="checkbox"]:checked'))
                              .map(cb => cb.value);
  const headers = categoryFields[selectedCategory];
  const tableHeaders = document.getElementById("tableHeaders");
  tableHeaders.innerHTML = "";

  headers.forEach(header => {
    if (selectedFields.includes(header)) {
      const th = document.createElement("th");
      th.textContent = header;
      tableHeaders.appendChild(th);
    }
  });
}

function renderTableRows() {

  const selectedFields = Array.from(fieldsCheckboxes.querySelectorAll('input[type="checkbox"]:checked'))
                              .map(cb => cb.value);

  const start = currentPage * productsPerPage;

    const row = tableBody.insertRow();

    selectedFields.forEach((field, idx) => {
      const cell = row.insertCell(idx);
      cell.classList.add('small-text');

        case "S.No":
          cell.textContent = start + index + 1;

          break;

            img.style.width = '60px';
            img.style.height = '60px';

  }
}

/* ---------------- Shared helpers for PDF report ---------------- */

async function imageToBase64(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = function () {
      const canvas = document.createElement("canvas");
      canvas.width = this.naturalWidth;
      canvas.height = this.naturalHeight;
      canvas.getContext("2d").drawImage(this, 0, 0);
      resolve(canvas.toDataURL("image/jpeg"));
    };
    img.onerror = function (err) {
      console.error("Failed to load image for PDF:", err);
      reject(err);
    };
    // proxy stays as in original to bypass CORS if needed
    img.src = `/proxy-image?url=${encodeURIComponent(url)}`;
  });
}

async function buildReportDocDefinitionFromTable() {
  const pageSize = document.getElementById("report-page-size-select").value;
  const table = document.getElementById('productTable');
  const headers = Array.from(table.rows[0].cells).map(cell => ({
    text: cell.textContent,
    style: 'tableHeader',
  }));

  const rows = [];
  for (let i = 1; i < table.rows.length; i++) {
    const row = Array.from(table.rows[i].cells);
    const rowData = [];

    for (let j = 0; j < row.length; j++) {
      const cell = row[j];
      if (headers[j].text === "Product Image" && cell.querySelector("img")) {
        try {
          const imageUrl = cell.querySelector("img").src;
          const base64Img = await imageToBase64(imageUrl);
          rowData.push({ image: base64Img, fit: [60, 60] });
        } catch (e) {
          rowData.push({ text: "Image Error", style: "tableCell" });
        }
      } else {
        rowData.push({ text: cell.textContent, style: "tableCell" });
      }
    }
    rows.push(rowData);
  }

  const widths = headers.map(h => (h.text === "Product Image" ? 70 : 'auto'));

  return {
    pageSize,
    pageOrientation: 'landscape',
    content: [
      { text: 'Product Report', style: 'title' },
      {
        table: {
          headerRows: 1,
          widths,
          body: [headers, ...rows],
          dontBreakRows: true
        },
        layout: {
          hLineWidth: () => 1,
          vLineWidth: () => 1,
          hLineColor: () => '#cccccc',
          vLineColor: () => '#cccccc',
          paddingLeft: () => 4,
          paddingRight: () => 4,
          paddingTop: () => 2,
          paddingBottom: () => 2,
        },
      }
    ],
    styles: {
      title: { fontSize: 18, bold: true, margin: [0, 0, 0, 10] },
      tableHeader: { bold: true, fillColor: '#f2f2f2', alignment: 'center' },
      tableCell: { margin: [2, 2, 2, 2] },
    }
  };
}

/* ---------------- Export current table to Excel (unchanged) ---------------- */

function exportToExcel() {
  const table = document.getElementById("productTable");
  const headers = Array.from(table.rows[0].cells).map(cell => cell.textContent);

  const imageColIndex = headers.findIndex(h => h.toLowerCase().includes("product image"));
  const filteredHeaders = headers.filter((_, i) => i !== imageColIndex);
  const rows = [filteredHeaders];

  for (let i = 1; i < table.rows.length; i++) {
    const cells = Array.from(table.rows[i].cells);
    const rowData = cells
      .filter((_, i) => i !== imageColIndex)
      .map(cell => cell.textContent.trim());
    rows.push(rowData);
  }

  const worksheet = XLSX.utils.aoa_to_sheet(rows);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Product Report");

  XLSX.writeFile(workbook, `Product_Report_${Date.now()}.xlsx`);
}

/* ---------------- Fetch all products for category ---------------- */

async function fetchAllProducts() {
  const categoryId = document.getElementById('categorySelect').value;
  const subCategoryId = document.getElementById('subCategorySelect').value || "";

  if (!categoryId) {
    alert("Please select a category.");
    return [];
  }

  selectedCategory = categoryId;
  const url = `/getReportAll/${categoryId}${subCategoryId ? `?subCategoryId=${subCategoryId}` : ""}`;
  try {
    const response = await fetch(url);
    if (!response.ok) {
      alert("No products found.");
      return [];
    }

    return await response.json();
  } catch (error) {
    console.error("Error fetching all products:", error);
    alert("Failed to fetch all products.");
    return [];
  }
}

/* ---------------- Download Tags (existing) ---------------- */

async function generateTagsPDF() {
	 const categoryId = document.getElementById('categorySelect').value;
	  if (!categoryId) { alert("Please select a category."); return; }

	  const tagSizeValue = document.getElementById('tag-size-select').value; // e.g. "72x144"
	  const [tagWidthPx, tagHeightPx] = tagSizeValue.split('x').map(Number);
	  const pxToPt = px => px * 72 / 96;
	  const tagWidthPt = pxToPt(tagWidthPx);
	  const tagHeightPt = pxToPt(tagHeightPx); // <-- add this line

	  const pageSize = document.getElementById('report-page-size-select').value || 'A4';
	  const fontSize = parseInt(document.getElementById('tag-font-size-select').value, 10) || 7;

	  showLoading();

	  try {
	    const response = await fetch(`/getReportAll/${categoryId}`);
	    if (!response.ok) { alert("Failed to fetch products."); hideLoading(); return; }
	    const products = await response.json();
	    if (!products.length) { alert("No products found."); hideLoading(); return; }

	    async function loadImageBase64(url) {
	      return new Promise((resolve, reject) => {
	        const img = new Image();
	        img.crossOrigin = "anonymous";
	        img.onload = () => {
	          const canvas = document.createElement('canvas');
	          canvas.width = img.naturalWidth;
	          canvas.height = img.naturalHeight;
	          const ctx = canvas.getContext('2d');
	          ctx.drawImage(img, 0, 0);
	          resolve(canvas.toDataURL('image/png'));
	        };
	        img.onerror = reject;
	        img.src = url;
	      });
	    }

	    const pageSizes = {
	      A4: { width: 595.28, height: 841.89 },
	      A5: { width: 420.94, height: 595.28 },
	      LETTER: { width: 612, height: 792 },
	      LEGAL: { width: 612, height: 1008 },
	    };
	    const ps = pageSizes[pageSize.toUpperCase()] || pageSizes.A4;
	    const pageWidth = ps.width;
	    const pageHeight = ps.height;

	    const margin = 18;
	    const usableWidth = pageWidth - margin * 2;
	    const usableHeight = pageHeight - margin * 2;

	    const tagsPerRow = Math.floor(usableWidth / tagWidthPt);
	    const tagsPerColumn = Math.floor(usableHeight / tagHeightPt);
	    const tagsPerPage = tagsPerRow * tagsPerColumn;

	    const docDefinition = {
	      pageSize,
	      pageOrientation: 'portrait',
	      pageMargins: [margin, margin, margin, margin],
	      content: [],
	      defaultStyle: { font: 'Roboto', fontSize },
	    };

	    // Define all possible fields with field name
	    const allFields = [
	      { key: 'beadsCt', label: 'Beads', rateKey: 'bdRate' },
	      { key: 'pearlsGm', label: 'Pearls', rateKey: 'prlRate' },
	      { key: 'ssPearlCt', label: 'SS Pearls', rateKey: 'ssRate' },
	      { key: 'otherStonesCt', label: 'Other', rateKey: 'otherStonesRt' },
	      { key: 'realStone', label: 'Real St', rateKey: 'fitting' },
	      { key: 'fitting', label: 'Fitting', rateKey: 'fitting' },
	      { key: 'diamondsCt', label: 'Diamonds', rateKey: 'diaRt' },
	      { key: 'vilandiCt', label: 'Vilandi', rateKey: 'vRate' },
	    ];

	    for (let i = 0; i < products.length; i += tagsPerPage) {
	      const pageProducts = products.slice(i, i + tagsPerPage);
	      const body = [];

	      for (let row = 0; row < tagsPerColumn; row++) {
	        const rowCells = [];
	        for (let col = 0; col < tagsPerRow; col++) {
	          const idx = row * tagsPerRow + col;
	          const product = pageProducts[idx];

	          if (!product) {
	            rowCells.push({
	              table: { widths: [tagWidthPt], body: [[{ text: ' ', height: tagHeightPt }]] },
	              layout: 'noBorders'
	            });
	            continue;
	          }

	          const orderNo = product.orders?.orderId || product.orderNo || "";
	          const designNo = product.designNo || "-";
	          const gross = product.gross || "";
	          const net = product.net || "";
	          const karat = product.karat || "";

	          let qrImage;
	          try { qrImage = await loadImageBase64(product.qrCodePath); } catch { qrImage = null; }

	          // --- Build stack content ---
	          const stackContent = [
	            { text: `${orderNo}/${designNo}`, margin: [2, 2, 0, 0] },
	            { text: `G-${gross}gm N-${net}gm(${karat}K)`,noWrap: true, margin: [2, 1, 0, 0] },
	          ];

	          // Add actual fields first
	          const filledFields = [];
	          const emptyFields = [];
	          for (const field of allFields) {
	            const value = product[field.key];
	            const rate = product[field.rateKey] || 0;
	            
	            let unit = "";
	            if (["beadsCt", "ssPearlCt", "otherStonesCt"].includes(field.key)) unit = " ct";
	            else if (field.key === "pearlsGm") unit = " gm";
	            
	            if (field.key === 'realStone' || field.key === 'fitting') {
	                if (value) filledFields.push({ text: `${field.label}: ${value}${unit}`, margin: [2, 1, 0, 0] });
	                else emptyFields.push({ text: ' ', margin: [2, 1, 0, 0] });
	              } else {
	                const rate = product[field.rateKey] || 0;
	                if (value) filledFields.push({ text: `${field.label}: ${value}${unit} - ₹${rate}`, margin: [2, 1, 0, 0] });
	                else emptyFields.push({ text: ' ', margin: [2, 1, 0, 0] });
	              }
	          }
	          stackContent.push(...filledFields, ...emptyFields); // empty rows at the end

	          // Horizontal line
	          stackContent.push({
	            canvas: [{ type: 'line', x1: 0, y1: 0, x2: tagWidthPt - 4, y2: 0, lineWidth: 0.5, lineColor: '#aaa' }],
	            margin: [2, 2, 2, 2]
	          });

	          // QR code
	           const qrWidth = Math.min(tagWidthPt * 1, tagHeightPt * 1); // 80% of tag width, max half of tag height
          stackContent.push(
            qrImage
              ? { image: qrImage, width: qrWidth, alignment: 'center', margin: [0, 3, 0, 0] }
              : { text: "QR Not Found", alignment: 'center', color: 'red', margin: [0, 3, 0, 0] }
          );

	          // Spacer to enforce uniform height
	          stackContent.push({ text: ' ', margin: [0, 0, 0, 0] });

	          const tagTable = {
	            table: {
	              widths: [tagWidthPt],
	              body: [[{ stack: stackContent, height: tagHeightPt, width: tagWidthPt, overflow: 'hidden' }]]
	            },
	            layout: {
	              hLineWidth: () => 0.5,
	              vLineWidth: () => 0.5,
	              hLineColor: () => '#bbb',
	              vLineColor: () => '#bbb',
	              paddingTop: () => 2,
	              paddingBottom: () => 2,
	              paddingLeft: () => 2,
	              paddingRight: () => 2,
	            }
	          };

	          rowCells.push(tagTable);
	        }
	        body.push({ columns: rowCells });
	      }

	      docDefinition.content.push(...body);
	      if (i + tagsPerPage < products.length) {
	        docDefinition.content.push({ text: '', pageBreak: 'after' });
	      }
	    }


    // Directly download PDF
    pdfMake.createPdf(docDefinition).download(`Product_Tags_${categoryId}_${Date.now()}.pdf`);

  } catch (error) {
    alert(`Error generating tags: ${error.message}`);
  } finally {
    hideLoading();
  }
}



//Place in the same <script> tag, above any usage
function toAbsoluteUrl(raw) {
  try { return new URL(raw, window.location.origin).toString(); } // resolve relative -> absolute
  catch { return raw; }
}

function toProxiedUrl(rawAbs) {
  if (!rawAbs) return null;
  if (rawAbs.includes('/proxy-image?')) return rawAbs; // avoid double-proxy
  const qs = new URLSearchParams({ url: rawAbs, t: String(Date.now()) });
  return `/proxy-image?${qs.toString()}`;
}

function imageToBase64Safe(rawUrl, timeoutMs = 10000) {
  return new Promise((resolve, reject) => {
    const abs = toAbsoluteUrl(rawUrl);
    const proxied = toProxiedUrl(abs);
    if (!proxied) return reject(new Error('bad-url'));
    const img = new Image();
    img.crossOrigin = 'anonymous';
    const timer = setTimeout(() => reject(new Error('img-timeout')), timeoutMs);
    img.onload = function () {
      clearTimeout(timer);
      try {
        const c = document.createElement('canvas');
        c.width = this.naturalWidth;
        c.height = this.naturalHeight;
        c.getContext('2d').drawImage(this, 0, 0);
        resolve(c.toDataURL('image/jpeg'));
      } catch (e) { reject(e); }
    };
    img.onerror = function (e) { clearTimeout(timer); reject(e); };
    img.src = proxied;
  });
}

            if (["beadsCt", "ssPearlCt", "otherStonesCt","diaWeight","vilandiCt"].includes(field.key)) unit = " ct";
            else if (field.key === "pearlsGm") unit = " gm";
            
            
            if (field.key === 'realStone' || field.key === 'fitting') {
                if (value) filledFields.push({ text: `${field.label}: ${value}${unit}`, margin: [2, 1, 0, 0] });
                else emptyFields.push({ text: ' ', margin: [2, 1, 0, 0] });
              } else {
                const rate = product[field.rateKey] || 0;
                if (value) filledFields.push({ text: `${field.label}: ${value}${unit} - ₹${rate}`, margin: [2, 1, 0, 0] });
                else emptyFields.push({ text: ' ', margin: [2, 1, 0, 0] });
              }
          }
          stackContent.push(...filledFields, ...emptyFields); // empty rows at the end

          // Horizontal line
          stackContent.push({
            canvas: [{ type: 'line', x1: 0, y1: 0, x2: tagWidthPt - 4, y2: 0, lineWidth: 0.5, lineColor: '#aaa' }],
            margin: [2, 2, 2, 2]
          });

          const qrWidth = Math.min(tagWidthPt * 1, tagHeightPt * 1); // 80% of tag width, max half of tag height
          stackContent.push(
            qrImage
              ? { image: qrImage, width: qrWidth, alignment: 'center', margin: [0, 3, 0, 0] }
              : { text: "QR Not Found", alignment: 'center', color: 'red', margin: [0, 3, 0, 0] }
          );

          // Spacer to enforce uniform height
          stackContent.push({ text: ' ', margin: [0, 0, 0, 0] });

          const tagTable = {
            table: {
              widths: [tagWidthPt],
              body: [[{ stack: stackContent, height: tagHeightPt, width: tagWidthPt, overflow: 'hidden' }]]
            },
            layout: {
              hLineWidth: () => 0.5,
              vLineWidth: () => 0.5,
              hLineColor: () => '#bbb',
              vLineColor: () => '#bbb',
              paddingTop: () => 2,
              paddingBottom: () => 2,
              paddingLeft: () => 2,
              paddingRight: () => 2,
            }
          };

          rowCells.push(tagTable);
        }
        body.push({ columns: rowCells });
      }

      docDefinition.content.push(...body);
      if (i + tagsPerPage < products.length) {
        docDefinition.content.push({ text: '', pageBreak: 'after' });
      }
    }

    pdfMake.createPdf(docDefinition).getBlob(blob => {
      const url = URL.createObjectURL(blob);
      const printWindow = window.open(url, '_blank');
      if (printWindow) printWindow.onload = () => printWindow.print();
    });

  } catch (error) {
    alert(`Error printing tags: ${error.message}`);
  } finally {
    hideLoading();
  }
}



async function exportFullExcel() {

	  if (!products.length) {
	    hideLoading();
	    return;
	  }

	  try {
	    const selectedFields = getSelectedFields();
	    const imageColIndex = selectedFields.findIndex(h => h.toLowerCase().includes("product image"));
	    const filteredHeaders = selectedFields.filter((_, i) => i !== imageColIndex);

	    const rows = [filteredHeaders];

	    products.forEach((product, i) => {
	      const row = [];
	      for (let j = 0; j < selectedFields.length; j++) {
	        if (j === imageColIndex) continue; // skip image in Excel

	        let value = "-";
	        const header = selectedFields[j];

	        switch (header) {
	          case "S.No":
	            value = i + 1;

	          case "Design No":
	            value = product.designNo || "-";
	            break;
	          case "Sub Category":
		            value = `${details[product.subCategoryId]  || "-"}`; break;
		            break;
	          case "Product Name":
	            value = product.item || "-";
	            break;
	          case "Karat":
	            value = product.karat || "-";
	            break;
	          case "Price":
	            value = product.price || "-";
	            break;
	          case "Net":
	            value = product.net || "-";
	            break;
	          case "Gross":
	            value = product.gross || "-";
	            break;
	          case "Vilandi":
	            value = product.vilandiCt || "-";
	            break;
	          case "Vilandi Rate":
	            value = product.vRate || "-";
	            break;
	          case "Diamonds (Ct)":
	            value = product.diamondsCt || "-";
	            break;
	          case "Diamond Price":
	            value = product.diaRt || "-";
	            break;
	          case "Beads (Ct.)":
	            value = product.beadsCt || "-";
	            break;
	          case "Beads Rate":
	            value = product.bdRate || "-";
	            break;
	          case "Pearls (gm)":
	          case "Pearls Weight (gm)":
	            value = product.pearlsGm || "-";
	            break;
	          case "Pearls Rate":
	            value = product.prlRate || "-";
	            break;
	          case "Stones":
	            value = product.stones || "-";
	            break;
	          case "Stones Rate":
	            value = product.stRate || "-";
	            break;
	          case "SS Pearls (Ct.)":
	            value = product.ssPearlCt || "-";
	            break;
	          case "SS Pearls Rate":
	            value = product.ssRate || "-";
	            break;
	          case "Real Stones (Ct.)":
	            value = product.realStone || "-";
	            break;
	          case "Fitting":
	            value = product.fitting || "-";
	            break;
	          case "Mozonite":
	            value = product.mozonite || "-";
	            break;
	          case "Mozonite Rate":
	            value = product.mRate || "-";
	            break;
	          case "Labour Charges":
	        	    if (product.labour) {
	        	        value = `₹ ${product.labour}` || "-";
	        	    } else if (product.labourAll) {
	        	        value =`₹ ${ product.labourAll}` || "-";
	        	    } else if (product.labourP) {
	        	        value =`₹ ${product.labourP}` || "-";
	        	    } else {
	        	        value = 0; // fallback if EVERYTHING is empty
	        	    }
	        	    break;

	          case "Remarks":
	            value = product.remarks || "-";
	            break;
	          case "Create Date":
	            value = product.createDateTime || "-";
	            break;
	          case "Update Date":
	            value = product.updateDateTime || "-";
	            break;
	          default:
	            value = "-";
	        }

	        row.push(value || "-");
	      }

	      rows.push(row);
	    });

	    const worksheet = XLSX.utils.aoa_to_sheet(rows);
	    const workbook = XLSX.utils.book_new();
	    XLSX.utils.book_append_sheet(workbook, worksheet, "Full Product Report");

	    XLSX.writeFile(workbook, `Full_Product_Report_${Date.now()}.xlsx`);
	  } catch (error) {
	    alert("Error generating Excel: " + error.message);

	    hideLoading();
	  }
	}

function showMode(mode, clickedBtn) {
	 resetAllInputs();

	// ✅ Remove active class from all mode buttons
	  document.querySelectorAll('#modeButtons button')
	    .forEach(btn => btn.classList.remove('active'));

	  // ✅ Add active class to clicked button

	  }

	  const categoryBlock = document.getElementById('categoryBlock');
	  const dateBlock = document.getElementById('dateBlock');
	  const pageSizeBlock = document.getElementById('pageSizeBlock');
	  const tagOptionsBlock = document.getElementById('tagOptionsBlock');
	  const fieldsCheckboxContainer = document.getElementById('fieldsCheckboxContainer');
	  const buttons = document.getElementById('categoryButtonsContainer');

	  categoryBlock.style.display = 'block';

function populateFieldCheckboxes() {
	  const selectedCat = document.getElementById('categorySelect').value;

	  // Do nothing if category not selected
	  if (!selectedCat || !categoryFields[selectedCat]) {
	    fieldsCheckboxContainer.style.display = 'none';
	    fieldsCheckboxes.innerHTML = "";
	    return;
	  }

	  // Do not show in TAGS or FOLD
	  if (currentMode === 'TAGS' || currentMode === 'FOLD') {
	    fieldsCheckboxContainer.style.display = 'none';
	    fieldsCheckboxes.innerHTML = "";
	    return;
	  }

	  fieldsCheckboxContainer.style.display = 'block';
	  fieldsCheckboxes.innerHTML = "";

	  categoryFields[selectedCat].forEach(field => {
	    const checkboxId = `fieldCheckbox_${field.replace(/\s+/g, '_')}`;

	    const wrapper = document.createElement('div');
	    wrapper.style.marginBottom = "4px";

	    const checkbox = document.createElement('input');
	    checkbox.type = 'checkbox';
	    checkbox.id = checkboxId;
	    checkbox.value = field;
	    checkbox.checked = true;

	    const label = document.createElement('label');
	    label.htmlFor = checkboxId;
	    label.style.marginLeft = "6px";
	    label.textContent = field;

	    wrapper.appendChild(checkbox);
	    wrapper.appendChild(label);
	    fieldsCheckboxes.appendChild(wrapper);
	  });
	}

function resetAllInputs() {
	  // Dropdowns
	  document.querySelectorAll('select').forEach(sel => {
	    sel.selectedIndex = 0;
	  });

	  // Text & date inputs
	  document.querySelectorAll('input[type="text"], input[type="date"]').forEach(inp => {
	    inp.value = '';
	  });

	  // Reset Flatpickr dates (if initialized)
	  if (window.flatpickr) {
	    document.querySelectorAll('.flatpickr-input').forEach(inp => {
	      inp._flatpickr?.clear();
	    });
	  }

	  // Clear messages
	  const msg = document.getElementById('messageContainer');
	  if (msg) msg.innerHTML = '';

	  // Hide table & pagination
	  document.getElementById('productTableContainer')?.style.setProperty('display','none');
	  document.getElementById('paginationControls')?.style.setProperty('display','none');
	  document.getElementById('foldStartSlot').value = 1;
	  document.getElementById('foldProductCount').value = '';

	  // Clear loaded data
	  loadedProducts = [];
	  currentPage = 0;
	  totalPages = 0;

	  // Reset field checkboxes
	  if (fieldsCheckboxes) fieldsCheckboxes.innerHTML = '';
	}
